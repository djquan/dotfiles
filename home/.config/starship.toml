# Catppuccin Mocha prompt
palette = "catppuccin_mocha"

format = """
$directory\
$git_branch\
$git_status\
$python\
$golang\
$rust\
$nodejs\
$ruby\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "bold fg:blue"
truncation_length = 3

[git_branch]
format = "[$symbol$branch]($style) "
style = "fg:mauve"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "fg:yellow"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "fg:yellow"

[python]
format = '[${symbol}${pyenv_prefix}(${version})]($style) '
symbol = " "
style = "fg:yellow"

[golang]
format = '[$symbol($version)]($style) '
symbol = " "
style = "fg:sapphire"

[rust]
format = '[$symbol($version)]($style) '
symbol = " "
style = "fg:peach"

[nodejs]
format = '[$symbol($version)]($style) '
symbol = " "
style = "fg:green"

[ruby]
format = '[$symbol($version)]($style) '
symbol = " "
style = "fg:red"

