# setw -g mode-mouse off
setw -g mode-keys vi
set -sg escape-time 0

# Enable mouse support in ~/.tmux.conf
set -g mouse on

# Synchronize panes
bind s set -g synchronize-panes

# horizontal and vertical splits
unbind |
bind | split-window -h -c "#{pane_current_path}"
unbind _
bind _ split-window -c "#{pane_current_path}"

# remap prefix to Control + a
set -g prefix C-a
unbind C-b
bind a send-prefix
# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf

# quick pane cycling
unbind ^A
bind ^A select-pane -t :.+

#improve colors
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ',ghostty:RGB'
set-option -g update-environment "TERM_PROGRAM"


set -g focus-events on

# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1

# renumber windows sequentially after closing any of them
set -g renumber-windows on
set-window-option -g automatic-rename off

# increase scrollback lines
set -g history-limit 10000

unbind +
bind + resize-pane -Z

unbind Right
bind Right resize-pane -R 8
unbind Left
bind Left resize-pane -L 8
unbind Up
bind Up resize-pane -U 4
unbind Down
bind Down resize-pane -D 4

unbind h
bind h select-pane -L
unbind j
bind j select-pane -D
unbind k
bind k select-pane -U
unbind l
bind l select-pane -R

# disable sound bell
set -g bell-action none
# # disable visual bell
set -g visual-bell off

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

thm_bg="#2d2a2e"
thm_bg_dark="#221f22"
thm_bg_highlight="#5b595c"
thm_surface="#403e41"
thm_muted="#939293"
thm_fg="#fcfcfa"
thm_fg_dim="#c1c0c0"
thm_red="#ff6188"
thm_green="#a9dc76"
thm_yellow="#ffd866"
thm_orange="#fc9867"
thm_purple="#ab9df2"
thm_cyan="#78dce8"

set-option -g status "on"

set -g mode-style "fg=$thm_bg,bg=$thm_yellow"

set -g message-style "fg=$thm_fg,bg=$thm_surface"
set -g message-command-style "fg=$thm_fg,bg=$thm_surface"

set -g pane-border-style "fg=$thm_bg_highlight"
set -g pane-active-border-style "fg=$thm_purple"

set -g window-style "fg=$thm_fg_dim,bg=$thm_bg_dark"
set -g window-active-style "fg=$thm_fg,bg=$thm_bg"

set-option -g display-panes-active-colour "$thm_purple"
set-option -g display-panes-colour "$thm_bg_highlight"

set-window-option -g clock-mode-colour "$thm_purple"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=$thm_fg,bg=$thm_bg_dark"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=$thm_bg_dark,bg=$thm_purple,bold] #S #[fg=$thm_purple,bg=$thm_bg_dark,nobold,nounderscore,noitalics]"
set -g status-right ""

setw -g window-status-activity-style "underscore,fg=$thm_yellow,bg=$thm_bg_dark"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=$thm_muted,bg=$thm_bg_dark"
setw -g window-status-format "#[fg=$thm_bg_dark,bg=$thm_bg_dark,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=$thm_bg_dark,bg=$thm_bg_dark,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=$thm_bg_dark,bg=$thm_surface,nobold,nounderscore,noitalics]#[fg=$thm_purple,bg=$thm_surface,bold] #I  #W #F #[fg=$thm_surface,bg=$thm_bg_dark,nobold,nounderscore,noitalics]"

set-window-option -g window-status-bell-style "bg=$thm_red,fg=$thm_bg_dark"

# ghostty notifications!
set -g allow-passthrough all

# tmux-plugins/tmux-prefix-highlight support
set -g @prefix_highlight_output_prefix "#[fg=$thm_yellow]#[bg=$thm_bg_dark]#[fg=$thm_bg_dark]#[bg=$thm_yellow]"
set -g @prefix_highlight_output_suffix ""
