# setw -g mode-mouse off
setw -g mode-keys vi
set -sg escape-time 0

# Enable mouse support in ~/.tmux.conf
set -g mouse on

# Synchronize panes
bind s set -g synchronize-panes

# horizontal and vertical splits
unbind |
bind | split-window -h -c "#{pane_current_path}"
unbind _
bind _ split-window -c "#{pane_current_path}"

# remap prefix to Control + a
set -g prefix C-a
unbind C-b
bind a send-prefix
# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf

# quick pane cycling
unbind ^A
bind ^A select-pane -t :.+

#improve colors
set-option -g default-terminal "screen-256color"
set-option -sa terminal-overrides ',xterm-256color:RGB'

set -g focus-events on

# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1

# renumber windows sequentially after closing any of them
set -g renumber-windows on
set-window-option -g automatic-rename off

# increase scrollback lines
set -g history-limit 10000

unbind +
bind + resize-pane -Z

unbind Right
bind Right resize-pane -R 8
unbind Left
bind Left resize-pane -L 8
unbind Up
bind Up resize-pane -U 4
unbind Down
bind Down resize-pane -D 4

unbind h
bind h select-pane -L
unbind j
bind j select-pane -D
unbind k
bind k select-pane -U
unbind l
bind l select-pane -R

# disable sound bell
set -g bell-action none
# # disable visual bell
set -g visual-bell off

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

## COLORSCHEME: Catppuccin Mocha
# base=#1e1e2e mantle=#181825 crust=#11111b
# surface0=#313244 surface1=#45475a surface2=#585b70
# overlay0=#6c7086 overlay1=#7f849c overlay2=#9399b2
# text=#cdd6f4 subtext0=#a6adc8 subtext1=#bac2de
# blue=#89b4fa lavender=#b4befe mauve=#cba6f7
# red=#f38ba8 peach=#fab387 yellow=#f9e2af green=#a6e3a1

thm_base="#1e1e2e"
thm_mantle="#181825"
thm_crust="#11111b"
thm_surface0="#313244"
thm_surface1="#45475a"
thm_surface2="#585b70"
thm_overlay0="#6c7086"
thm_text="#cdd6f4"
thm_subtext1="#bac2de"
thm_blue="#89b4fa"
thm_lavender="#b4befe"
thm_red="#f38ba8"
thm_yellow="#f9e2af"
thm_mauve="#cba6f7"
thm_green="#a6e3a1"
thm_peach="#fab387"

set-option -g status "on"

set -g mode-style "fg=$thm_base,bg=$thm_blue"

set -g message-style "fg=$thm_text,bg=$thm_surface0"
set -g message-command-style "fg=$thm_text,bg=$thm_surface0"

set -g pane-border-style "fg=$thm_surface1"
set -g pane-active-border-style "fg=$thm_blue"

set -g window-style "fg=$thm_subtext1,bg=$thm_mantle"
set -g window-active-style "fg=$thm_text,bg=$thm_base"

set-option -g display-panes-active-colour "$thm_blue"
set-option -g display-panes-colour "$thm_surface1"

set-window-option -g clock-mode-colour "$thm_blue"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=$thm_text,bg=$thm_mantle"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=$thm_crust,bg=$thm_blue,bold] #S #[fg=$thm_blue,bg=$thm_mantle,nobold,nounderscore,noitalics]"
set -g status-right ""

setw -g window-status-activity-style "underscore,fg=$thm_yellow,bg=$thm_mantle"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=$thm_overlay0,bg=$thm_mantle"
setw -g window-status-format "#[fg=$thm_mantle,bg=$thm_mantle,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=$thm_mantle,bg=$thm_mantle,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=$thm_mantle,bg=$thm_surface1,nobold,nounderscore,noitalics]#[fg=$thm_blue,bg=$thm_surface1,bold] #I  #W #F #[fg=$thm_surface1,bg=$thm_mantle,nobold,nounderscore,noitalics]"

set-window-option -g window-status-bell-style "bg=$thm_red,fg=$thm_crust"

# tmux-plugins/tmux-prefix-highlight support
set -g @prefix_highlight_output_prefix "#[fg=$thm_yellow]#[bg=$thm_mantle]#[fg=$thm_crust]#[bg=$thm_yellow]"
set -g @prefix_highlight_output_suffix ""
